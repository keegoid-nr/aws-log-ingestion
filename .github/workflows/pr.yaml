name: New Relic - AWS Logs Ingestion - Pull Request

on:
  pull_request:
  pull_request_target:
    types: [opened, reopened]
  schedule:
    # Every day at 11:30 AM IST (6:00 AM UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:

# Baseline least-privilege permissions for all jobs.
# Trivy jobs override to add `security-events: write` for SARIF upload.
permissions:
  contents: read

jobs:
  lint:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        python-version: ["3.13"]
        poetry-version: ["1.8.3"]
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          poetry-version: ${{ matrix.poetry-version }}
      - name: Install Project
        run: poetry install --no-interaction
      - name: Lint
        run: |
          poetry run flake8 src test
          poetry run black --check src test

  test:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        python-version: ["3.13"]
        poetry-version: ["1.4"]
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install Project
        run: poetry install --no-interaction
      - name: Test
        run: poetry run pytest

  trivy:
    name: Trivy security scan
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-results.sarif'
          exit-code: '1'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Notify Slack on scheduled scan failure
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": ":rotating_light: Trivy detected HIGH/CRITICAL CVEs on master in ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nFindings: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is%3Aopen+tool%3ATrivy"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TRIVY_WEBHOOK_URL }}

  trivy-image:
    name: Trivy Docker image scan
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aws-log-ingestion:scan .

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: aws-log-ingestion:scan
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Notify Slack on scheduled image scan failure
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": ":rotating_light: Trivy image scan detected HIGH/CRITICAL CVEs in ${{ github.repository }} Docker image\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nFindings: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is%3Aopen+tool%3ATrivy"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TRIVY_WEBHOOK_URL }}

  dependabot-notify:
    name: Notify Slack on Dependabot PR
    # IMPORTANT: This job uses pull_request_target which has full secrets access.
    # Do NOT add a `checkout` step here — that would run PR-supplied code with secrets.
    # This job's only purpose is to POST to Slack with metadata; nothing else.
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": ":robot_face: Dependabot opened a PR in ${{ github.repository }}\nTitle: ${{ github.event.pull_request.title }}\nPR: ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TRIVY_WEBHOOK_URL }}
